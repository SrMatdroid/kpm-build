name: Build KPM module for Android kernel 5.10

on:
  push:
    paths:
      - 'framework_spoof.c'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu make

      - name: Download and prepare kernel headers (Android 5.10)
        run: |
          git clone --depth 1 -b android12-5.10-lts https://android.googlesource.com/kernel/common.git kernel-headers
          cd kernel-headers
          make ARCH=arm64 defconfig
          make ARCH=arm64 modules_prepare

      - name: Build the module
        run: |
          cat > Makefile <<EOF
          obj-m += framework_spoof.o
          ccflags-y := -D__KERNEL__ -DMODULE
          all:
          	make -C kernel-headers M=\$(PWD) modules
          clean:
          	make -C kernel-headers M=\$(PWD) clean
          EOF
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu-

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: framework_spoof.ko
          path: framework_spoof.ko
