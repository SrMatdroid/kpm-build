name: Build kernel module

on:
  push:
    paths:
      - 'framework_spoof.c'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Get kernel headers (5.10)
        run: |
          git clone --depth 1 -b android12-5.10-lts https://android.googlesource.com/kernel/common.git kernel-headers
          cd kernel-headers
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare

      - name: Build module
        run: |
          cat > Makefile <<EOF
          obj-m += framework_spoof.o
          ccflags-y := -D__KERNEL__ -DMODULE
          all:
          	make -C kernel-headers M=\$(PWD) modules
          clean:
          	make -C kernel-headers M=\$(PWD) clean
          EOF
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -C kernel-headers M=$(pwd) modules

      - name: Upload .ko
        uses: actions/upload-artifact@v4
        with:
          name: framework_spoof.ko
          path: framework_spoof.ko