name: Build KPM

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            wget xz-utils make git ca-certificates

      - name: Descargar ARM GNU Toolchain 12.2.Rel1
        run: |
          wget -q \
            https://developer.arm.com/-/media/Files/downloads/gnu/12.2.rel1/binrel/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-elf.tar.xz \
            -O toolchain.tar.xz
          tar -xf toolchain.tar.xz
          echo "$PWD/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-elf/bin" >> $GITHUB_PATH

      - name: Verificar toolchain
        run: aarch64-none-elf-gcc --version

      - name: Clonar headers de KernelPatch
        run: |
          git clone --depth=1 \
            https://github.com/bmax121/KernelPatch.git \
            KernelPatch

      - name: Compilar KPM
        run: |
          make CROSS_COMPILE=aarch64-none-elf- KP_DIR=$PWD/KernelPatch

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: kpm-build-${{ github.run_number }}
          path: "*.kpm"
          if-no-files-found: error
          
